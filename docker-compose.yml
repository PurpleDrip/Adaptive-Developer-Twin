version: "3.8"

services:
  neo4j:
    image: neo4j:5.12
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "cypher-shell",
          "-u",
          "$${NEO4J_USER}",
          "-p",
          "$${NEO4J_PASSWORD}",
          "MATCH () RETURN count(*) limit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build: ./Authentication-Service
    ports:
      - "8001:8000"
    environment:
      THG_URL: ${THG_URL}
      FUSION_URL: ${FUSION_URL}

  telemetry-service:
    build: ./Telemetry-Service
    ports:
      - "8002:8000"
    environment:
      FUSION_URL: ${FUSION_URL}
      THG_URL: ${THG_URL}

  fusion-service:
    build: ./Fusion-Engine
    ports:
      - "8003:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

  thg-service:
    build: ./THG-Service
    ports:
      - "8004:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - neo4j

  allocation-engine:
    build: ./Allocation-Engine
    ports:
      - "8005:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - neo4j

  gateway-service:
    build: ./Gateway-Service
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:3000,http://localhost:5173,http://127.0.0.1,http://127.0.0.1:3000,http://127.0.0.1:5173
      AUTH_URL: ${AUTH_URL}
      TELEMETRY_URL: ${TELEMETRY_URL}
      FUSION_URL: ${FUSION_URL}
      THG_URL: ${THG_URL}
      ALLOCATION_URL: ${ALLOCATION_URL}

  dashboard-service:
    build: ./Dashboard-Service
    ports:
      - "80:8000"
    depends_on:
      - gateway-service

volumes:
  neo4j_data:
  neo4j_logs:
