version: "3.8"

services:
  telemetry-service:
    build:
      context: .
      dockerfile: backend/telemetry/Dockerfile
    ports:
      - "8002:8000"
    environment:
      FUSION_URL: ${FUSION_URL}
      THG_URL: ${THG_URL}
      AUTH_URL: ${AUTH_URL}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
    restart: always

  fusion-service:
    build:
      context: .
      dockerfile: backend/fusion/Dockerfile
    ports:
      - "8003:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
    restart: always

  thg-service:
    build:
      context: .
      dockerfile: backend/thg/Dockerfile
    ports:
      - "8004:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      MONGO_URI: ${MONGO_URI}
    restart: always

  allocation-engine:
    build:
      context: .
      dockerfile: backend/allocation/Dockerfile
    ports:
      - "8005:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI}
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      THG_URL: ${THG_URL}
      FUSION_URL: ${FUSION_URL}
      MONGO_URI: ${MONGO_URI}
    restart: always

  analytics-service:
    build:
      context: .
      dockerfile: backend/analytics/Dockerfile
    ports:
      - "8006:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      THG_URL: ${THG_URL}
      FUSION_URL: ${FUSION_URL}
      REDIS_URL: ${REDIS_URL}
    restart: always

  monitoring-service:
    build:
      context: .
      dockerfile: backend/monitoring/Dockerfile
    ports:
      - "8007:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
    restart: always

  task-service:
    build:
      context: .
      dockerfile: backend/task/Dockerfile
    ports:
      - "8008:8000"
    environment:
      MONGO_URI: ${MONGO_URI}
      THG_URL: ${THG_URL}
      ALLOCATION_URL: ${ALLOCATION_URL}
      FUSION_URL: ${FUSION_URL}
      REDIS_URL: ${REDIS_URL}
    restart: always

  gateway-service:
    build:
      context: .
      dockerfile: backend/gateway/Dockerfile
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS}
      AUTH_URL: ${AUTH_URL}
      TELEMETRY_URL: ${TELEMETRY_URL}
      FUSION_URL: ${FUSION_URL}
      THG_URL: ${THG_URL}
      ALLOCATION_URL: ${ALLOCATION_URL}
      ANALYTICS_URL: ${ANALYTICS_URL}
      MONITORING_URL: ${MONITORING_URL}
      TASK_URL: ${TASK_URL}
    restart: always

  auth-service:
    build:
      context: .
      dockerfile: backend/auth/Dockerfile
    ports:
      - "8001:8000"
    environment:
      THG_URL: ${THG_URL}
      FUSION_URL: ${FUSION_URL}
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
    restart: always
